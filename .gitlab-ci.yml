default:
  image: python:3.11-slim-bookworm
  interruptible: true

stages:
  - validate
  - test
  - build
  - scan
  - package
  - docs

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .cache/pip

.python-job:
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"

lint:
  extends: .python-job
  stage: validate
  script:
    - ruff check src tests scripts
    - black --check src tests scripts

type_check:
  extends: .python-job
  stage: validate
  script:
    - mypy src

tests:
  extends: .python-job
  stage: test
  script:
    - python scripts/generate_sample_data.py
    - pytest --cov=geoflood --cov-report=xml --cov-report=term-missing --junitxml=junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - coverage.xml
      - junit.xml
      - tests/data/sample_dem.tif
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build_package:
  extends: .python-job
  stage: build
  script:
    - python -m build
  artifacts:
    expire_in: 1 week
    paths:
      - dist/

build_docker:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build --pull --tag "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH'

dependency_scan:
  extends: .python-job
  stage: scan
  script:
    - pip-audit
  allow_failure: true

container_scan:
  stage: scan
  image:
    name: aquasec/trivy:0.58.1
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_AUTH_URL: "$CI_REGISTRY"
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format template --template "@/contrib/gitlab.tpl" --output gl-container-scanning-report.json "$IMAGE_TAG"
    - trivy image --exit-code 1 --severity CRITICAL "$IMAGE_TAG"
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      container_scanning: gl-container-scanning-report.json
  needs: ["build_docker"]
  rules:
    - if: '$CI_COMMIT_BRANCH'

demo_run:
  extends: .python-job
  stage: package
  script:
    - python scripts/generate_sample_data.py
    - geoflood run --dem tests/data/sample_dem.tif --water-level 3.2 --output outputs/demo_flood_depth.tif --zones tests/data/sample_zones.geojson --summary outputs/demo_zonal_stats.csv --report outputs/demo_report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - outputs/

pages:
  extends: .python-job
  stage: docs
  script:
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public/
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
